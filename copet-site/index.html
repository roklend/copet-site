<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CoPet</title>
  <meta name="description" content="CoPet render preview">
  <link rel="stylesheet" href="style.css">

<body>
  <main class="stage">

              .64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
              .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
              0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
            />
          </svg>
          <span>GitHub</span>
        </a>
      </div>

      <ul class="feature-list" aria-label="CoPet features">
        <li>reacts to thinking, tools, done, error</li>
        <li>lives on your desktop</li>
        <li>local-first</li>
        <li>made for Codex in VS Code</li>
      </ul>

      <p class="meta-line">
        <span>by roklend</span>
        <span aria-hidden="true">&middot;</span>
        <a href="https://t.me/yuriispace" aria-label="Open Telegram channel">Telegram</a>
        <span aria-hidden="true">&middot;</span>
        <a href="https://github.com/roklend" aria-label="Open GitHub profile">GitHub</a>
      </p>
    </section>

    <section class="player-shell" aria-label="CoPet render preview">
      <img
        id="frame-player"
        class="player-frame"
        src="render/output/x2/frame_0001.png"
        alt="CoPet render preview"
        width="512"
        height="568"
      >
    </section>
  </main>

  <script src="copet.js"></script>
</body>
</html>
